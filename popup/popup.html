<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YT Bookmarker</title>
    <link rel="stylesheet" href="../styles.css">
</head>

<body>
    <div class="ytb-container">
        <div class="ytb-header">
            <h1 class="ytb-title">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"
                    style="vertical-align: middle; margin-right: 8px;">
                    <path d="M17 3H7c-1.1 0-2 .9-2 2v16l7-3 7 3V5c0-1.1-.9-2-2-2z" />
                </svg>
                YT Bookmarker
            </h1>
            <p class="ytb-subtitle">Save the moments worth returning to.</p>
            <div class="ytb-summary" id="summary">Ready for your next bookmark</div>
        </div>
        <div class="ytb-bookmarks" id="bookmarks">
            <!-- Bookmarks will be dynamically inserted here -->
        </div>
    </div>
    <script src="../dist/popup/index.js"></script>
</body>

</html>
